version: "3.8"

networks:
  kafka-net:
    driver: bridge

volumes:
  zk1-data:
  zk2-data:
  zk3-data:
  kafka1-data:
  kafka2-data:
  kafka3-data:


services:
  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.4.4
    hostname: zookeeper-1
    container_name: zookeeper-1
    networks: [ kafka-net ]
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.4.4
    hostname: zookeeper-2
    container_name: zookeeper-2
    networks: [ kafka-net ]
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.4.4
    hostname: zookeeper-3
    container_name: zookeeper-3
    networks: [ kafka-net ]
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888

  kafka-1:
    image: confluentinc/cp-kafka:7.4.4
    hostname: kafka-1
    container_name: kafka-1
    networks: [ kafka-net ]
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-2:
    image: confluentinc/cp-kafka:7.4.4
    hostname: kafka-2
    container_name: kafka-2
    networks: [ kafka-net ]
    depends_on: [ zookeeper-1, zookeeper-2, zookeeper-3 ]
    ports:
      - "39092:39092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,PLAINTEXT_HOST://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  kafka-3:
    image: confluentinc/cp-kafka:7.4.4
    hostname: kafka-3
    container_name: kafka-3
    networks: [ kafka-net ]
    depends_on: [ zookeeper-1, zookeeper-2, zookeeper-3 ]
    ports:
      - "49092:49092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:49092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,PLAINTEXT_HOST://localhost:49092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [ kafka-net ]
    depends_on: [ kafka-1, kafka-2, kafka-3 ]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
  ms-productor-ubicaciones:
    image: kvrodriguezg/ms-productor-ubicaciones:latest
    container_name: ms-productor
    networks: [ kafka-net ]
    depends_on:
      - kafka-1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092

  ms-procesador-horarios:
    image: kvrodriguezg/ms-procesador-horarios:latest
    container_name: ms-procesador
    networks: [ kafka-net ]
    depends_on:
      - kafka-1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092

  ms-monitor-oracle:
    image: kvrodriguezg/ms-monitor-oracle:latest
    container_name: ms-monitor
    networks: [ kafka-net ]
    ports:
      - "8080:8080"
    depends_on:
      - kafka-1
    volumes:
      - /home/ec2-user/wallet/Wallet_JAAA0F5TN6FLH4KW:/app/wallet
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@jaaa0f5tn6flh4kw_tp?TNS_ADMIN=/app/wallet
      - TZ=America/Santiago
